[project]
name = "orxhestra-code"
version = "0.0.21"
description = "AI coding agent powered by orxhestra — reads, writes, edits code and runs commands"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [
    {name = "Nicolai M. T. Lassen"},
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: OS Independent",
]
dependencies = [
    "orxhestra[cli]>=0.0.52",
    "pyyaml>=6.0",
    "aiosqlite>=0.20",
    "sqlalchemy[asyncio]>=2.0",
]

[project.optional-dependencies]
openai = ["orxhestra[openai]>=0.0.52"]
anthropic = ["orxhestra[anthropic]>=0.0.52"]
google = ["orxhestra[google]>=0.0.52"]
google-vertexai = ["orxhestra[google-vertexai]>=0.0.52"]
aws = ["orxhestra[aws]>=0.0.52"]
azure-ai = ["orxhestra[azure-ai]>=0.0.52"]
mistral = ["orxhestra[mistral]>=0.0.52"]
cohere = ["orxhestra[cohere]>=0.0.52"]
fireworks = ["orxhestra[fireworks]>=0.0.52"]
together = ["orxhestra[together]>=0.0.52"]
groq = ["orxhestra[groq]>=0.0.52"]
nvidia = ["orxhestra[nvidia]>=0.0.52"]
huggingface = ["orxhestra[huggingface]>=0.0.52"]
deepseek = ["orxhestra[deepseek]>=0.0.52"]
ollama = ["orxhestra[ollama]>=0.0.52"]
xai = ["orxhestra[xai]>=0.0.52"]
ibm = ["orxhestra[ibm]>=0.0.52"]
perplexity = ["orxhestra[perplexity]>=0.0.52"]
openrouter = ["orxhestra[openrouter]>=0.0.52"]
upstage = ["orxhestra[upstage]>=0.0.52"]
all = ["orxhestra[all]>=0.0.52"]

[project.scripts]
orx-coder = "orxhestra_code.main:main"

[project.urls]
Homepage = "https://github.com/NicolaiLassen/orxhestra-code"
Repository = "https://github.com/NicolaiLassen/orxhestra-code"

[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["orxhestra_code*"]

[tool.uv]
dev-dependencies = [
    "pytest>=9.0",
    "pytest-asyncio>=0.25",
    "ruff>=0.11",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
