<svg viewBox="0 0 200 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1" />
      <stop offset="20%" stop-color="#3b82f6" stop-opacity="1" />
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="1" />
      <stop offset="80%" stop-color="#38bdf8" stop-opacity="1" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="50%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="codeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient id="codeBorder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.4" />
    </linearGradient>
    <linearGradient id="codeText" x1="55" y1="0" x2="145" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
  </defs>

  <!-- Wave Icon (centered) -->
  <g transform="translate(50, 5)">
    <path d="M 5 50 L 20 50 C 30 50, 35 10, 50 50 C 65 90, 70 50, 80 50 L 95 50" stroke="url(#waveFade)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 5 50 L 20 50 C 30 50, 35 90, 50 50 C 65 10, 70 50, 80 50 L 95 50" stroke="url(#waveFade)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 5 50 L 20 50 C 30 50, 35 25, 50 50 C 65 75, 70 50, 80 50 L 95 50" stroke="#6366F1" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M 5 50 L 20 50 C 30 50, 35 75, 50 50 C 65 25, 70 50, 80 50 L 95 50" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M 5 50 L 20 50 C 30 50, 35 38, 50 50 C 65 62, 70 50, 80 50 L 95 50" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M 5 50 L 20 50 C 30 50, 35 62, 50 50 C 65 38, 70 50, 80 50 L 95 50" stroke="#C084FC" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- ORXHESTRA -->
  <text x="100" y="108" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="30" font-style="italic" fill="url(#textGrad)" letter-spacing="-0.5">ORXHESTRA</text>

  <!-- CODE label (below ORXHESTRA, centered) -->
  <text x="100" y="128" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace" font-weight="600" font-size="14" fill="url(#codeText)" letter-spacing="2">CODE</text>
</svg>
